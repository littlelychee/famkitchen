{% extends "base.html" %}

{% block title %}注册 - 私家御膳房{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-md items-center px-4 py-8">
  <div class="card w-full bg-base-100 shadow-md">
    <div class="card-body">
      <h1 class="card-title text-2xl">注册</h1>
      <p class="text-sm text-stone-500">创建账号后，可以创建家庭或加入已有家庭。</p>

      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% include "partials/form_fields.html" %}
        <button class="btn btn-primary w-full">注册并进入</button>
      </form>

      <div class="text-center text-sm">
        <span class="text-stone-500">已有账号？</span>
        <a href="{% url 'login' %}" class="link link-primary">去登录</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
