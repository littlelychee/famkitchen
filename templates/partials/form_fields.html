{% if form.non_field_errors and not suppress_non_field_errors %}
  <div class="alert alert-error">
    <span>{{ form.non_field_errors|striptags }}</span>
  </div>
{% endif %}

{% for field in form %}
  <div class="form-control w-full">
    <label class="label" for="{{ field.id_for_label }}">
      <span class="label-text">{{ field.label }}</span>
      {% if field.field.required %}
        <span class="label-text-alt text-error">必填</span>
      {% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
      <div class="label">
        <span class="label-text-alt text-stone-500">{{ field.help_text }}</span>
      </div>
    {% endif %}
    {% if field.errors %}
      <div class="label">
        <span class="label-text-alt text-error">{{ field.errors|striptags }}</span>
      </div>
    {% endif %}
  </div>
{% endfor %}
