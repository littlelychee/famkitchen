{% extends "base.html" %}

{% block title %}消息 - 法米狗私厨{% endblock %}

{% block content %}
<section class="mx-auto max-w-4xl px-3 py-4 sm:px-4 sm:py-6">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div class="flex min-w-0 items-center gap-3">
      <span class="inline-grid h-12 w-12 place-items-center rounded-full bg-base-100 text-stone-700 shadow-sm">
        <i data-lucide="bell-ring" aria-hidden="true"></i>
      </span>
      <div class="min-w-0">
        <h1 class="text-xl font-semibold">消息</h1>
        <p class="truncate text-sm text-stone-500">{{ family.name }} · 收件箱和发送记录</p>
      </div>
    </div>
    <div class="flex shrink-0 items-center gap-2">
      <a href="{% url 'meals:notification_create' %}" class="btn btn-primary btn-sm" aria-label="发消息" title="发消息">
        <i data-lucide="message-square-plus" aria-hidden="true"></i>
        <span>发消息</span>
      </a>
      <form method="post" action="{% url 'meals:notifications_clear' %}">
        {% csrf_token %}
        <button class="btn btn-outline btn-sm" onclick="return confirm('确定清空你的收件箱消息吗？发送记录和其他家人的消息不会被清空。')">
          <i data-lucide="trash-2" aria-hidden="true"></i>
          <span>清空</span>
        </button>
      </form>
    </div>
  </div>

  {% if notifications %}
    <div class="grid gap-3">
      {% include "meals/partials/notification_page.html" %}
    </div>
  {% else %}
    <div class="rounded-lg border border-dashed border-base-300 bg-base-100 p-8 text-center text-sm text-stone-500 shadow-sm">
      <div class="mx-auto mb-3 inline-grid h-14 w-14 place-items-center rounded-full bg-base-200">
        <i data-lucide="bell" aria-hidden="true"></i>
      </div>
      <p>还没有你的消息。</p>
    </div>
  {% endif %}
</section>
{% endblock %}
