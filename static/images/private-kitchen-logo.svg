<svg xmlns="http://www.w3.org/2000/svg" width="420" height="132" viewBox="0 0 420 132" role="img" aria-labelledby="title desc">
  <title id="title">法米狗私厨 logo</title>
  <desc id="desc">浅米红金色调的长方形法米狗私厨品牌标识，带御字印章和柔和渐变边缘。</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f0"/>
      <stop offset="0.55" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#f7f5f1"/>
    </linearGradient>
    <radialGradient id="halo" cx="48%" cy="50%" r="65%">
      <stop offset="0" stop-color="#ffe8d8" stop-opacity="0.86"/>
      <stop offset="0.68" stop-color="#fff4e9" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#f7f5f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="shadow" x="-15%" y="-35%" width="130%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#5b2a1f" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="420" height="132" fill="none"/>
  <rect x="6" y="8" width="408" height="116" rx="36" fill="url(#halo)" filter="url(#soft)"/>
  <rect x="20" y="20" width="380" height="92" rx="22" fill="url(#panel)" opacity="0.94" filter="url(#shadow)"/>
  <rect x="48" y="34" width="65" height="65" rx="18" fill="#fff2e8" stroke="#d7a65f" stroke-width="2"/>
  <path d="M58 45c12-8 33-8 45 0M60 88c14 7 29 7 43 0" fill="none" stroke="#c64b35" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
  <text x="80.5" y="78" text-anchor="middle" fill="#9f3428" font-family="'Songti SC','STSong','Noto Serif CJK SC',serif" font-size="34" font-weight="800">御</text>
  <path d="M130 39c10 7 16 17 18 30s8 22 18 30" fill="none" stroke="#e3bf77" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <text x="159" y="61" fill="#2b201b" font-family="'Songti SC','STSong','Noto Serif CJK SC',serif" font-size="33" font-weight="700" letter-spacing="2">法米狗私厨</text>
