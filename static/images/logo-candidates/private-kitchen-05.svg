      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#27241f" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="420" height="132" fill="none"/>
  <rect x="8" y="8" width="404" height="116" rx="36" fill="url(#halo)" filter="url(#soft)"/>
