<svg xmlns="http://www.w3.org/2000/svg" width="420" height="132" viewBox="0 0 420 132" role="img" aria-labelledby="title desc">
  <title id="title">私家御膳房 logo 候选 5</title>
  <desc id="desc">浅墨米色调的长方形私家御膳房品牌标识，带庭院窗格和餐盘图形，边缘柔和渐变。</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.5" stop-color="#f7f5f1"/>
      <stop offset="1" stop-color="#f4fbf4"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="66%">
      <stop offset="0" stop-color="#f1eadf" stop-opacity="0.9"/>
      <stop offset="0.66" stop-color="#f8f3ec" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f7f5f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
