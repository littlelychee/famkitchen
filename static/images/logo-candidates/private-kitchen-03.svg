      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18394b" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="420" height="132" fill="none"/>
  <rect x="8" y="10" width="404" height="112" rx="34" fill="url(#halo)" filter="url(#soft)"/>
