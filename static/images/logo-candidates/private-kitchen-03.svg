  <path d="M52 76h56" fill="none" stroke="#376b8f" stroke-width="5" stroke-linecap="round"/>
  <path d="M66 58c-8-11 10-16 2-27M83 58c-8-11 10-16 2-27M100 58c-8-11 10-16 2-27" fill="none" stroke="#d4a84d" stroke-width="3" stroke-linecap="round" opacity="0.78"/>
