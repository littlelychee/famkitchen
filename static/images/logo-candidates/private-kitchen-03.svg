<svg xmlns="http://www.w3.org/2000/svg" width="420" height="132" viewBox="0 0 420 132" role="img" aria-labelledby="title desc">
  <title id="title">私家御膳房 logo 候选 3</title>
  <desc id="desc">浅瓷蓝色调的长方形私家御膳房品牌标识，带热汤碗图形和柔和渐变边缘。</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.52" stop-color="#fffdf5"/>
      <stop offset="1" stop-color="#f7f5f1"/>
    </linearGradient>
    <radialGradient id="halo" cx="51%" cy="50%" r="66%">
      <stop offset="0" stop-color="#dff2ff" stop-opacity="0.84"/>
      <stop offset="0.63" stop-color="#f5fbff" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#f7f5f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
