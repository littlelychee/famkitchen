<svg xmlns="http://www.w3.org/2000/svg" width="420" height="132" viewBox="0 0 420 132" role="img" aria-labelledby="title desc">
  <title id="title">私家御膳房 logo 候选 1</title>
  <desc id="desc">浅绿金色调的长方形私家御膳房品牌标识，带餐盖图形和柔和渐变边缘。</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fff5"/>
      <stop offset="0.48" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f5f1e7"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="62%">
      <stop offset="0" stop-color="#fff8e3" stop-opacity="0.95"/>
      <stop offset="0.62" stop-color="#f5f1e7" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#f7f5f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-15%" y="-35%" width="130%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#4c3a21" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="420" height="132" fill="none"/>
  <rect x="10" y="10" width="400" height="112" rx="34" fill="url(#halo)" filter="url(#soft)"/>
  <rect x="18" y="18" width="384" height="96" rx="30" fill="url(#panel)" opacity="0.94" filter="url(#shadow)"/>
  <path d="M34 30c38-14 82-14 120 0" fill="none" stroke="#d3b866" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
