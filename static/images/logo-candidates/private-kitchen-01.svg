  <path d="M48 77h58" fill="none" stroke="#385335" stroke-width="5" stroke-linecap="round"/>
  <path d="M55 73c2-20 17-34 32-34s30 14 32 34" fill="none" stroke="#385335" stroke-width="5" stroke-linecap="round"/>
