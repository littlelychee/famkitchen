  <text x="320" y="44" text-anchor="middle" fill="#5c3420" stroke="#fff6df" stroke-width="2.5" paint-order="stroke fill" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="22" font-weight="900" letter-spacing="1.1">幸福就是一起吃饭，吃好多好多顿饭</text>
  <g transform="translate(573 39)" fill="#f28f7c" opacity="0.88">
