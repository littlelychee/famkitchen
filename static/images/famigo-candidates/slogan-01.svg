<svg xmlns="http://www.w3.org/2000/svg" width="640" height="72" viewBox="0 0 640 72" role="img" aria-labelledby="title desc">
  <title id="title">法米狗标语横幅候选 1</title>
  <desc id="desc">暖米色薄横幅，含小狗爪、热气和幸福就是一起吃饭，吃好多好多顿饭的艺术字。</desc>
  <defs>
    <linearGradient id="panel" x1="20" y1="8" x2="620" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9ee"/>
      <stop offset="0.5" stop-color="#fffefa"/>
      <stop offset="1" stop-color="#f3f8ed"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-60%" width="116%" height="220%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#6d4a24" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="12" y="9" width="616" height="54" rx="18" fill="url(#panel)" filter="url(#shadow)"/>
  <path d="M35 42c14-8 30-8 44 0" fill="none" stroke="#94ad68" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
