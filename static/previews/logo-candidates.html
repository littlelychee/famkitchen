<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法米狗私厨 v1.4 大 logo 候选</title>
  <style>
    :root {
      --page: #f7f5f1;
      --ink: #211d19;
      --muted: #6f6861;
      --line: #ddd6cb;
      --card: #fffefa;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      padding: 18px;
      box-shadow: 0 12px 32px rgba(33, 29, 25, 0.08);
    }

    .card.is-selected {
      border-color: #d8b062;
      box-shadow: 0 12px 32px rgba(174, 126, 40, 0.16);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .stage {
      display: grid;
      min-height: 150px;
      place-items: center;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.6), rgba(244,241,235,0.3)),
        var(--page);
    }

    img {
      display: block;
      width: min(100%, 420px);
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>法米狗私厨 v1.4 大 logo 候选</h1>
    <p>已选入轮换：2、3、4、6、8、9、10。项目里的轮换清单会按这些编号每 7 天循环一次。</p>
    <div class="grid">
      <section class="card"><h2>候选 1 · 厨师小狗</h2><div class="stage"><img src="../images/logo-candidates/v14-01.svg" alt="候选 1"></div></section>
      <section class="card is-selected"><h2>候选 2 · 小狗餐碗</h2><div class="stage"><img src="../images/logo-candidates/v14-02.svg" alt="候选 2"></div></section>
      <section class="card is-selected"><h2>候选 3 · 小狗餐盖</h2><div class="stage"><img src="../images/logo-candidates/v14-03.svg" alt="候选 3"></div></section>
      <section class="card is-selected"><h2>候选 4 · 爪印菜单</h2><div class="stage"><img src="../images/logo-candidates/v14-04.svg" alt="候选 4"></div></section>
      <section class="card"><h2>候选 5 · 围裙小狗</h2><div class="stage"><img src="../images/logo-candidates/v14-05.svg" alt="候选 5"></div></section>
      <section class="card is-selected"><h2>候选 6 · 汤锅小狗</h2><div class="stage"><img src="../images/logo-candidates/v14-06.svg" alt="候选 6"></div></section>
      <section class="card"><h2>候选 7 · 餐盘狗鼻</h2><div class="stage"><img src="../images/logo-candidates/v14-07.svg" alt="候选 7"></div></section>
      <section class="card is-selected"><h2>候选 8 · 小狗便当</h2><div class="stage"><img src="../images/logo-candidates/v14-08.svg" alt="候选 8"></div></section>
      <section class="card is-selected"><h2>候选 9 · 小狗煎锅</h2><div class="stage"><img src="../images/logo-candidates/v14-09.svg" alt="候选 9"></div></section>
      <section class="card is-selected"><h2>候选 10 · 小狗饭碗</h2><div class="stage"><img src="../images/logo-candidates/v14-10.svg" alt="候选 10"></div></section>
    </div>
  </main>
</body>
</html>
